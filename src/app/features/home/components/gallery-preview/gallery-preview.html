<section class="gallery-preview section bg-surface" id="gallery" aria-labelledby="gallery-preview-title">
  <div class="container gallery-preview__inner">
    <!-- Header -->
    <div class="gallery-preview__header" style="text-align: center;">
      <span class="section-tag gallery-preview__label">Visual Journey</span>
      <h2 class="display-lg gallery-preview__title font-heading" id="gallery-preview-title">
        The Sanjivani Experience
      </h2>
      <p class="body-xl gallery-preview__tag text-muted" style="margin-left: auto; margin-right: auto;">
        Catch a glimpse of the serene moments and vibrant life at our farm.
      </p>
    </div>

    <!-- Infinite Auto Slider -->
    <div class="gallery-preview__slider-wrap">
      <!-- We duplicate the images to create a seamless infinite marquee effect -->
      <div class="gallery-preview__track">
        @for (img of images; track $index) {
          <div class="gallery-preview__slide">
            <img [src]="img" alt="Gallery glimpse" loading="lazy" class="gallery-preview__img">
          </div>
        }
        @for (img of images; track 'dup' + $index) {
          <div class="gallery-preview__slide">
            <img [src]="img" alt="Gallery glimpse" loading="lazy" class="gallery-preview__img">
          </div>
        }
      </div>
    </div>

    <!-- CTA -->
    <div class="gallery-preview__action" style="text-align: center;">
      <a routerLink="/gallery" class="btn btn-primary" id="home-explore-gallery">
        Explore Gallery
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </a>
    </div>
  </div>
</section>
